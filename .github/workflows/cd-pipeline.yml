name: Deploy to Kubernetes Produccion

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy-and-validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Helm Upgrade
      run: |
        helm upgrade --install tb-erp-release ./k8s/helm \
          --namespace tb-produccion \
          --wait --timeout 3m

    - name: Smoke Tests (Liveness Validation)
      id: smoke_tests
      run: |
        curl -f http://prod.tb-gestion.com/api/health || exit 1

    - name: Auto-Rollback en Fallo
      if: failure()
      run: |
        echo "🚨 Fallo detectado post-despliegue. Evocando Auto-Rollback SRE..."
        helm rollback tb-erp-release 1 --namespace tb-produccion
        echo "✅ Rollback Finalizado."
