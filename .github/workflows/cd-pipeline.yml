name: CD Pipeline - Continuous Deploy & Audit

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]

jobs:
  audit-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Make scripts executable
        run: chmod +x *.sh

      - name: Install Node Dependencies for Audit
        run: npm ci

      - name: Setup Trivy Scanner
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        continue-on-error: true

      - name: Continuous Production Audit
        run: ./audit.sh

      - name: Upload Audit Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production_audit_results
          path: |
            production_audit_report.json
            Documento_Certificacion_StockPro.md
            audit_ab_backend.txt
            audit_ab_frontend.txt
            audit_trivy_stockpro.txt
            audit_logs.txt
          retention-days: 7

      - name: Verificar Artefactos Subidos
        run: |
          echo "Archivos encontrados y subidos:"
          ls -la production_audit_report.json Documento_Certificacion_StockPro.md audit_ab_backend.txt audit_ab_frontend.txt audit_trivy_stockpro.txt audit_logs.txt || true
          
          archivos=("production_audit_report.json" "Documento_Certificacion_StockPro.md" "audit_ab_backend.txt" "audit_ab_frontend.txt" "audit_trivy_stockpro.txt" "audit_logs.txt")
          faltan=0
          for archivo in "${archivos[@]}"; do
            if [ ! -f "$archivo" ]; then
              echo "❌ Archivo no encontrado: $archivo"
              faltan=1
            fi
          done
          
          if [ $faltan -eq 1 ]; then
            echo "Faltan artefactos críticos. Fallando el pipeline."
            exit 1
          else
            echo "✅ Artefactos preparados y subidos correctamente"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/stock-system-backend:${{ github.sha }}
            docker.io/${{ secrets.DOCKER_USERNAME }}/stock-system-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/stock-system-frontend:${{ github.sha }}
            docker.io/${{ secrets.DOCKER_USERNAME }}/stock-system-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: audit-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets['KUBE_CONFIG'] }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.1'

      - name: Deploy to Kubernetes
        env:
          DB_PASSWORD: ${{ secrets['DB_PASSWORD'] }}
          JWT_SECRET: ${{ secrets['JWT_SECRET'] }}
          MELI: ${{ secrets['MELI'] }}
          REDIS_PASSWORD: ${{ secrets['REDIS_PASSWORD'] }}
        run: |
          echo "Ejecutando Despliegue con Helm..."
          helm upgrade --install stock-system ./k8s/charts/stock-system \
            --namespace stock-system \
            --create-namespace \
            --set backend.image.repository=${{ secrets.DOCKER_USERNAME }}/stock-system-backend \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.repository=${{ secrets.DOCKER_USERNAME }}/stock-system-frontend \
            --set frontend.image.tag=${{ github.sha }} \
            --set secrets.dbPassword=$DB_PASSWORD \
            --set secrets.jwtSecret=$JWT_SECRET \
            --set secrets.meliAccessToken=$MELI \
            --set secrets.redisPassword=$REDIS_PASSWORD \
            --atomic --timeout 10m

  post-deploy-validation:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets['KUBE_CONFIG'] }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config

      - name: Wait for Pods
        run: |
          echo "Esperando que los pods en namespace stock-system estén corriendo..."
          sleep 10
          kubectl get pods -n stock-system

      - name: Validate System Health (Smoke Test)
        run: |
          echo "Simulando Test de Humo post-despliegue..."
          kubectl get pods -n stock-system | grep Running
          if [ $? -ne 0 ]; then
            echo "❌ Fallo la validación: Pods no están corriendo"
            echo "Invocando rollback automático vía helm history/rollback (Simulado)"
            exit 1
          fi
          echo "✅ Sistema validado, corriendo exitosamente."
