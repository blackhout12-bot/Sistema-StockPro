name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/stock-system-backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/stock-system-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/stock-system-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/stock-system-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}/stock-system-backend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.1'

      - name: Deploy to Kubernetes
        run: |
          helm upgrade --install stock-system ./k8s/charts/stock-system \
            --namespace stock-system \
            --create-namespace \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }} \
            --set secrets.dbPassword=${{ secrets.DB_PASSK }} \
            --set secrets.jwtSecret=${{ secrets.JWT_SECRET }} \
            --set secrets.meliAccessToken=${{ secrets.MELI }} \
            --atomic --timeout 10m

  smoke-tests:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Validate Pods
        run: |
          kubectl get pods -n stock-system
          STATUS=$(kubectl get pods -n stock-system -l app=stock-system-backend -o jsonpath='{.items[*].status.phase}')
          if [[ "$STATUS" != *"Running"* ]]; then
            echo "Error: Backend pods are not running"
            exit 1
          fi

      - name: Validate Backend Health
        run: |
          RESPONSE=$(curl -k -s -w "%{http_code}" https://api.stocksystem.com/health -o /dev/null)
          if [ "$RESPONSE" != "200" ]; then
            echo "Error: Backend health check failed with status $RESPONSE"
            exit 1
          fi

      - name: Validate Frontend Access
        run: |
          RESPONSE=$(curl -k -s -w "%{http_code}" https://app.stocksystem.com -o /dev/null)
          if [ "$RESPONSE" != "200" ]; then
            echo "Error: Frontend access failed with status $RESPONSE"
            exit 1
          fi

      - name: Validate Mobile Ping
        run: |
          RESPONSE=$(curl -k -s -w "%{http_code}" https://api.stocksystem.com/mobile/ping -o /dev/null)
          if [ "$RESPONSE" != "200" ]; then
            echo "Error: Mobile ping failed with status $RESPONSE"
            exit 1
          fi
