name: CI / CD StockPro -> GestiónMax

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Instalar dependencias backend
      run: npm ci || npm install

    - name: Ejecutar pruebas unitarias backend
      run: npm run test --if-present

    - name: Cache Frontend Node Modules
      uses: actions/cache@v3
      with:
        path: frontend/node_modules
        key: ${{ runner.os }}-frontend-npm-${{ hashFiles('frontend/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-frontend-npm-

    - name: Instalar dependencias frontend
      run: cd frontend && (npm ci || npm install)

    - name: Compilar Frontend (Validación Build)
      run: cd frontend && npm run build
      env:
        CI: false # previene fallos por advertencias de sintaxis estrictas en React
