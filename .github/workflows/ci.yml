name: Stock System CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        cache: 'npm'

    - name: Install dependencies (Backend)
      run: npm ci

    - name: Install dependencies (Frontend)
      run: cd frontend && npm ci

    - name: Run Lint
      run: npx eslint src/**/*.js --fix-dry-run

    - name: Run Tests
      run: npm test
      env:
        DB_HOST: localhost
        DB_USER: sa
        DB_PASSWORD: Password123!
        DB_NAME: StockDB
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        JWT_SECRET: test_secret

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Backend Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ghcr.io/${{ github.repository }}/stock-system-backend:${{ github.sha }}
          ghcr.io/${{ github.repository }}/stock-system-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ghcr.io/${{ github.repository }}/stock-system-frontend:${{ github.sha }}
          ghcr.io/${{ github.repository }}/stock-system-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Trivy Vulnerability Scanner (Backend)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'ghcr.io/${{ github.repository }}/stock-system-backend:${{ github.sha }}'
        format: 'table'
        exit-code: '0' # Para esta iteración, advertir sin romper build
        severity: 'CRITICAL,HIGH'

    - name: Deploy to Kubernetes (Helm)
      if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
      run: |
        echo "Simulando despliegue de Helm..."
        cd k8s/charts/stock-system
        helm lint
        # En producción real:
        # helm upgrade --install stock-system . -n prod --set backend.image.tag=${{ github.sha }} --set frontend.image.tag=${{ github.sha }} --wait --timeout 5m
