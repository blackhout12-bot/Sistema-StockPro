name: Version Sync Validation

on:
  push:
    branches: [ "main" ]
  push:
    tags:
      - 'v*'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Validate tags exist
        run: |
          git fetch --tags
          for tag in $(git tag -l); do
            if git ls-remote --tags origin | grep -q "$tag"; then
              echo "✅ Tag $tag está en remoto."
            else
              echo "❌ Tag $tag no está en remoto."
              exit 1
            fi
          done

      - name: Run tests
        run: npm test
