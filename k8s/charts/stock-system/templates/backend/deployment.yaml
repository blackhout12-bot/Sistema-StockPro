apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app: {{ .Release.Name }}-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-secrets
          env:
            - name: NODE_ENV
              value: {{ .Values.global.environment }}
            - name: DB_HOST
              value: {{ .Values.backend.env.DB_HOST }}
            - name: DB_NAME
              value: {{ .Values.backend.env.DB_NAME }}
            - name: REDIS_HOST
              value: {{ .Values.backend.env.REDIS_HOST }}
            - name: OTEL_ENABLED
              value: {{ .Values.secrets.otelEnabled | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otel.collectorEndpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.observability.otel.serviceName | quote }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
