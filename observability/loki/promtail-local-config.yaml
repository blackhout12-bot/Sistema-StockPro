server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/lapi/prom/push

scrape_configs:
- job_name: system
  static_configs:
  - targets:
      - localhost
    labels:
      job: varlogs
      __path__: /var/log/*log
- job_name: stockpro-backend
  static_configs:
  - targets:
      - localhost
    labels:
      job: nodejs
      __path__: /app/logs/*.log # We will configure Pino to write here
