# observability/prometheus/alerts.yml
# Reglas de Alertas: Disparador CI/CD (v1.20)
groups:
  - name: Resiliencia-ERP-Deployments
    rules:
      - alert: ErrorRateHigh
        expr: rate(stock_system_http_requests_total{status=~"5.."}[2m]) > 5
        for: 1m
        labels:
          severity: critical
          auto_rollback: "true"
        annotations:
          summary: "Umbral crítico de Error 5XX post-despligue"
          description: "La API de TB Gestión está fallando severamente tras el último release. Iniciando Rollback CI/CD."

      - alert: APIHighLatency
        expr: histogram_quantile(0.95, rate(stock_system_http_request_duration_seconds_bucket[2m])) > 2.0
        for: 2m
        labels:
          severity: warning
          auto_rollback: "false"
        annotations:
          summary: "Tiempos de respuesta lentos detectados (P95 > 2s)"
          description: "La API presenta latencia elevada. Puede requerir escalado o revisión de índices SQL."

      - alert: POSNodeDisconnected
        expr: up{job="stock-system-pos"} == 0
        for: 1m
        labels:
          severity: critical
          auto_rollback: "true"
        annotations:
          summary: "Corte de Comunicación con POS/Facturación"
          description: "Los pods primarios de Facturación cayeron. Esto indica un crash loop post-despliegue."
